<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Expense Tracker | Premium Money Manager</title>
</head>

<body>
  <div id="root">
    <h2 style="padding: 20px; text-align: center; color: white;">LOADING APP...</h2>
  </div>
  <script>
    // Unregister any cached service workers that might be serving a broken app state
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Catch script runtime errors
    window.onerror = function (message, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="padding: 20px; color: #991b1b; background: #fee2e2; z-index: 9999; position: absolute; top:0; left:0; right:0;">' + 
      '<h3>Global Error</h3>' +
      '<p>' + message + '</p>' +
      '<p><small>' + source + ' : ' + lineno + '</small></p>' +
      '</div>';
      return false;
    };

    // Catch script load errors
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'SCRIPT') {
        document.body.innerHTML += '<div style="padding: 20px; color: #991b1b; background: #fee2e2; z-index: 9999; position: absolute; top:0; left:0; right:0; margin-top: 100px;">' + 
        '<h3>Script Load Failed</h3>' +
        '<p>Could not load: ' + e.target.src + '</p>' +
        '</div>';
      }
    }, true);
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
